# Server
server.port=${PORT}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI}

# JWT (30 days in ms)
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# CoinGecko API
app.coingecko.base-url=https://api.coingecko.com/api/v3
app.coingecko.api-key=${COINGECKO_API_KEY}

# Security
app.security.encryption-key=${ENCRYPTION_KEY}
app.auth.refresh-cookie-name=${REFRESH_COOKIE_NAME}

# Frontend
app.frontend.base-url=${FRONTEND_URL}
app.api.base-url=${API_BASE_URL}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# News + notifications
app.news.cryptopanic-key=${CRYPTOPANIC_API_KEY}
app.news.gnews-key=${GNEWS_API_KEY}
app.notifications.sendgrid-api-key=${SENDGRID_API_KEY}
app.notifications.mail-from=${MAIL_FROM}

# Social auth
app.oauth.google.client-id=${GOOGLE_CLIENT_ID}
app.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.oauth.github.client-id=${GITHUB_CLIENT_ID}
app.oauth.github.client-secret=${GITHUB_CLIENT_SECRET}
app.oauth.facebook.client-id=${FACEBOOK_CLIENT_ID}
app.oauth.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}
app.oauth.facebook.version=${FACEBOOK_OAUTH_VERSION}

# Suppress auto-generated security password log
spring.security.user.name=disabled
spring.security.user.password=disabled

# Logging
logging.level.com.coinvista=INFO
logging.level.org.springframework.security=WARN
